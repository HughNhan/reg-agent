# LLM Server Configuration
# Location-independent HTTP API for AI features

server:
  host: 0.0.0.0
  port: 8000
  debug: false

# LLM Backend Configuration
# Supported backends: ollama, vertex-ai, anthropic-api
backend:
  type: ollama  # Default to Ollama (free, local)

  # Ollama configuration
  ollama:
    url: http://localhost:11434
    model: llama3.1:8b
    timeout: 120

  # Vertex AI Claude configuration
  vertex_ai:
    project_id: your-gcp-project
    location: us-east5
    model: claude-3-5-sonnet-v2@20241022
    # Credentials: Uses GOOGLE_APPLICATION_CREDENTIALS env var or gcloud auth

  # Anthropic API configuration
  anthropic_api:
    api_key: ${ANTHROPIC_API_KEY}  # From environment variable
    model: claude-3-5-sonnet-20241022
    max_tokens: 4096

# Logging
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
